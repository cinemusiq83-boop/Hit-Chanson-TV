<style>
* { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
html, body { margin: 0; height: 100%; background: #000; overflow: hidden; font-family: 'Oswald', Arial, sans-serif; }

/* ── PLAYER ── */
#player {
  position: absolute; left: 0; top: 0; width: 100%; height: 100%;
  background: #000; object-fit: cover;
}

/* ── CONTROLS ── */
#controls {
  position: absolute; left: 20px;
  top: max(20px, env(safe-area-inset-top));
  display: flex; gap: 10px; z-index: 20;
  transition: opacity 0.4s ease;
}
body.controls-hidden #controls { opacity: 0; pointer-events: none; }

button {
  background: rgba(255,255,255,0.12); color: white;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 6px; padding: 8px 12px; font-size: 15px;
  cursor: pointer; -webkit-appearance: none; touch-action: manipulation;
  font-family: 'Oswald', Arial, sans-serif;
}

/* ── SEARCH ── */
#searchWrapper { position: relative; }
#searchInput {
  background: rgba(0,0,0,0.6); color: white;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 6px; padding: 6px 12px; font-size: 15px;
  width: 220px; outline: none; -webkit-appearance: none;
  font-family: 'Oswald', Arial, sans-serif;
}
#searchInput::placeholder { color: rgba(255,255,255,0.45); }
#searchResults {
  position: absolute; top: 110%; left: 0; width: 100%; max-height: 50vh;
  overflow-y: auto; background: rgba(0,0,0,0.95);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 6px; z-index: 100; display: none;
  -webkit-overflow-scrolling: touch;
}
#searchResults div {
  padding: 12px 14px; font-size: 14px; color: #fff; cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  touch-action: manipulation;
  font-family: 'Oswald', Arial, sans-serif;
}
#searchResults div:active { background: rgba(255,45,45,0.35); }
#searchResults div span { color: rgba(255,255,255,0.5); font-size: 12px; }

/* HORLOGE */
#parisTime {
  position: absolute;
  left: 1.7%;
  top: 7.5%;
  width: 17%;
  height: 9%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-family: 'Bebas Neue', Impact, sans-serif;
  font-size: clamp(46px, 2.5vw, 70px);  
  letter-spacing: 3px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.85);
  z-index: 20;
  opacity: 0.92;
  pointer-events: none;
  transition: opacity 0.4s ease;
}

/* LOGO */
#logo {
  position: absolute;
  left: 5.2%;
  top: 72%;
  width: calc(13% + 10px);
  height: calc(15% + 10px);
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
  opacity: 0.95;
  z-index: 20;
  pointer-events: none;
}

/* ══════════════════════════════════════
   LOWER THIRD DESIGN
══════════════════════════════════════ */
#lowerThird {
  position: absolute;
  top: 76%;
  left: calc(9.7% + 8.5% + 20px);
  width: calc(100vw - (10% + 8.5% + 40px));
  max-width: calc(100vw - (10% + 8.5% + 40px));
  height: 74px;
  z-index: 30;
  pointer-events: none;
  display: none;
}

/* Structure des lignes horizontales */
.line {
  position: absolute;
  height: 2.5px;
  transform-origin: left;
  transform: scaleX(0);
  z-index: 1;
}

/* Configuration des 6 lignes */
.l-1 { top: 20px;  left: 0px;   width: 100%; background-color: #ffffff; }
.l-1.lt-enter { animation: lineDraw 0.6s ease forwards 0.1s, scanMove 1.8s ease-in-out 0.7s infinite alternate; }

.l-2 { top: 29px; left: 0px;   width: 70%;  background-color: #ffffff; }
.l-2.lt-enter { animation: lineDraw 0.6s ease forwards 0.2s, scanMoveInverse 1.5s ease-in-out 0.8s infinite alternate; }

.l-3 { top: 37px; left: 0px;   width: 80%;  height: 3px; background-color: #c0191a; }
.l-3.lt-enter { animation: lineDraw 0.6s ease forwards 0.3s, scanMove 1.2s ease-in-out 0.9s infinite alternate; }

.l-4 { top: 44px; left: 0px; width: calc(60% + 35px); background-color: #ffffff; }
.l-4.lt-enter { animation: lineDraw 0.6s ease forwards 0.4s, scanMoveInverse 2s ease-in-out 1s infinite alternate; }

.l-5a { top: 53px; left: -70px; width: 70px; background-color: #ffffff; transform-origin: right; }
.l-5a.lt-enter { animation: lineDraw 0.6s ease forwards 0.5s; }

.l-5 { top: 53px; left: 0px; width: 50%; background-color: #ffffff; }
.l-5.lt-enter { animation: lineDraw 0.6s ease forwards 0.5s; }
.l-5.lt-moving { animation: lineDraw 0.6s ease forwards 0.5s, scanMove 1.6s ease-in-out 0s infinite alternate; }

.l-6 { top: 62px; left: 0px;   width: 90%;  background-color: #ffffff; }
.l-6.lt-enter { animation: lineDraw 0.6s ease forwards 0.6s, scanMoveInverse 2.2s ease-in-out 1.2s infinite alternate; }

/* --- BLOC SUPÉRIEUR (ARTISTE ROUGE) --- */
.center-band {
  position: absolute;
  top: 0px; left: 0px;
  width: auto; height: 44px;
  display: flex;
  align-items: center;
  z-index: 2;
}

.red-block {
  background-color: #c0191a;
  height: 100%;
  padding: 0 16px;
  display: flex;
  align-items: center;
  transform: scaleX(0);
  transform-origin: left;
}
.red-block.lt-enter {
  animation: lineDraw 0.5s cubic-bezier(0.1, 0.8, 0.2, 1) 0.4s forwards;
}
.red-block.lt-exit {
  animation: lineClose 0.4s cubic-bezier(0.77, 0, 0.175, 1) forwards;
}

.artist-text {
  color: #ffffff;
  font-family: 'Bebas Neue', Impact, sans-serif;
  font-size: 24px;
  font-weight: 400; 
  letter-spacing: 2.5px;
  white-space: nowrap;
}

/* --- BLOC INFÉRIEUR BLANC CHRONOMÉTRÉ --- */
.sub-text-area {
  position: absolute;
  top: 44px; left: 0px;
  height: 30px;
  background-color: #ffffff;
  overflow: hidden;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  z-index: 2;
  width: 0px; 
  opacity: 0;
  transition: width 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s ease;
}
.sub-text-area.lt-enter {
  animation: fadeInBlock 0.3s ease 0.6s forwards;
}
/* Fermeture : se retire vers la gauche */
.sub-text-area.lt-exit {
  animation: lineClose 0.4s cubic-bezier(0.77, 0, 0.175, 1) forwards !important;
  transition: opacity 0.2s ease !important;
}

.rolling-wrapper {
  position: absolute;
  top: 0; left: 0;
  width: auto;
  display: flex;
  flex-direction: column;
  transition: transform 0.5s cubic-bezier(0.77, 0, 0.175, 1);
  transform: translateY(0px);
}

.text-item {
  height: 30px;
  display: inline-flex;
  align-items: center;
  padding: 0 15px;
  color: #000000;
  font-family: 'Bebas Neue', Impact, sans-serif;
  font-size: 17px;
  letter-spacing: 1.5px;
  white-space: nowrap;
  width: max-content;
}

/* Animations Keyframes */
@keyframes lineDraw  { from { transform: scaleX(0); } to { transform: scaleX(1); } }
@keyframes lineClose { from { transform: scaleX(1); } to { transform: scaleX(0); } }
@keyframes fadeInBlock { to { opacity: 1; } }

@keyframes scanMove        { 0% { transform: scaleX(1) translateX(0);     } 100% { transform: scaleX(1) translateX(15px);  } }
@keyframes scanMoveInverse { 0% { transform: scaleX(1) translateX(12px);  } 100% { transform: scaleX(1) translateX(-8px);  } }

/* ── SPLASH ── */
#splash {
  position: fixed; inset: 0; background: #000; z-index: 9999;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 30px;
}
#splash img { width: 180px; opacity: 0.95; border-radius: 24px; }
#splashBtn {
  background: #ff2d2d; color: #fff; border: none; border-radius: 14px;
  padding: 18px 52px; font-size: 22px; font-weight: 800; cursor: pointer;
  letter-spacing: 2px; box-shadow: 0 6px 24px rgba(255,45,45,0.4);
  font-family: 'Bebas Neue', Impact, sans-serif;
}
</style>

let playlist = [...playlistSource];
const player = document.getElementById('player');
let currentIndex = 0;

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}
shuffle(playlist);

function initPlaylist() {
  currentIndex = 0;
  loadVideo(currentIndex);
}

function loadVideo(index) {
  if (index >= playlist.length) { shuffle(playlist); index = 0; }
  if (index < 0) index = playlist.length - 1;
  currentIndex = index;
  
  const item = playlist[currentIndex];
  player.style.objectFit = item.dezoom ? 'contain' : 'cover';
  resetLowerThird();

  if (window.Hls && Hls.isSupported() && item.url.includes('.m3u8')) {
    if (window.hls) window.hls.destroy();
    window.hls = new Hls();
    window.hls.loadSource(item.url);
    window.hls.attachMedia(player);
  } else {
    player.src = item.url;
    player.load();
  }
  player.play().catch(()=>{});
}

player.addEventListener('ended', () => {
  currentIndex++;
  loadVideo(currentIndex);
});

/* ── GESTION DU LOWER THIRD ── */
let ltTimer = null;
let ltRollInterval = null;
let ltActive = false;
let widthsArray = [0, 0, 0, 0];

function resetLowerThird() {
  clearTimeout(ltTimer);
  clearInterval(ltRollInterval);
  const lt = document.getElementById('lowerThird');
  lt.style.display = 'none';
  
  const elements = lt.querySelectorAll('.line, .red-block, .sub-text-area');
  elements.forEach(el => el.classList.remove('lt-enter', 'lt-exit', 'lt-moving'));
  
  document.getElementById('textRoller').style.transform = 'translateY(0px)';
  ltActive = false;
}

function triggerLowerThird() {
  if (ltActive) return;

  const current = playlist[currentIndex];

  // Ne pas afficher le lower third pour Michael Jackson ou The Jacksons
  const excludedArtists = ['michael jackson', 'the jacksons', 'usa for africa'];
  const artistLower = current.artiste.toLowerCase();
  if (excludedArtists.some(name => artistLower.includes(name))) return;

  ltActive = true;
  
  document.getElementById('ltArtistText').textContent = current.artiste.toUpperCase();
  document.getElementById('ltItem0').textContent = current.titre.toUpperCase();
  document.getElementById('ltItem1').textContent = current.compositeurs ? current.compositeurs.toUpperCase() : 'COMPOSITEUR INCONNU';
  document.getElementById('ltItem2').textContent = `${current.label.toUpperCase()} · ${current.annee}`;
  document.getElementById('ltItem3').textContent = current.titre.toUpperCase();

  const lt = document.getElementById('lowerThird');
  lt.style.display = 'block';

  const enterElements = lt.querySelectorAll('.line, .red-block, .sub-text-area');
  enterElements.forEach(el => el.classList.add('lt-enter'));

  const item0Width = document.getElementById('ltItem0').offsetWidth;
  const item1Width = document.getElementById('ltItem1').offsetWidth;
  const item2Width = document.getElementById('ltItem2').offsetWidth;
  const item3Width = document.getElementById('ltItem3').offsetWidth;
  widthsArray = [item0Width, item1Width, item2Width, item3Width];

  const whiteBlock = document.getElementById('whiteBlock');
  const textRoller = document.getElementById('textRoller');

  // Calculer le décalage à partir du milieu de la 2ème lettre du nom de l'artiste
  const artistText = document.getElementById('ltArtistText');
  const artistStr = artistText.textContent;
  let offset3Letters = 0;
  if (artistStr.length >= 2) {
    const measureSpan = document.createElement('span');
    measureSpan.style.cssText = `
      font-family: 'Bebas Neue', Impact, sans-serif;
      font-size: 24px;
      font-weight: 400;
      letter-spacing: 2.5px;
      white-space: nowrap;
      position: absolute;
      visibility: hidden;
      padding: 0 16px;
    `;
    // Mesure la largeur jusqu'à la fin de la 1ère lettre
    measureSpan.textContent = artistStr.slice(0, 1);
    document.body.appendChild(measureSpan);
    const width1 = measureSpan.offsetWidth;

    // Mesure la largeur jusqu'à la fin de la 2ème lettre
    measureSpan.textContent = artistStr.slice(0, 2);
    const width2 = measureSpan.offsetWidth;
    document.body.removeChild(measureSpan);

    // Milieu de la 2ème lettre = fin de la 1ère + moitié de la largeur de la 2ème
    const letterWidth = width2 - width1;
    offset3Letters = width1 + letterWidth / 2;
  }

  whiteBlock.style.left = `${offset3Letters}px`;
  whiteBlock.style.width = `${widthsArray[0]}px`;
  textRoller.style.transition = 'none';
  textRoller.style.transform = 'translateY(-90px)';
  setTimeout(() => { textRoller.style.transition = ''; }, 50);

  // Aligner la ligne 5 avec le bord gauche du bloc blanc
  const l5 = lt.querySelector('.l-5');
  if (l5) l5.style.left = `${offset3Letters}px`;

  // Aligner la ligne 5a pour qu'elle arrive exactement au début de la ligne 5
  const l5a = lt.querySelector('.l-5a');
  if (l5a) l5a.style.width = `${offset3Letters + 70}px`;

  // Déclencher le mouvement de la ligne 5 quand le bloc blanc est visible (après fadeInBlock : 0.6s délai + 0.3s durée = 0.9s)
  setTimeout(() => {
    if (l5) l5.classList.add('lt-moving');
  }, 900);

  let step = 0;
  ltRollInterval = setInterval(() => {
    step++;
    if (step <= 3) {
      textRoller.style.transform = `translateY(${-90 + step * 30}px)`;
      whiteBlock.style.width = `${widthsArray[step]}px`;
    }
    if (step === 3) clearInterval(ltRollInterval);
  }, 2000);

  ltTimer = setTimeout(() => {
    closeLowerThird();
  }, SHOW_DURATION * 1000);
}

function closeLowerThird() {
  const lt = document.getElementById('lowerThird');
  const whiteBlock = document.getElementById('whiteBlock');

  lt.querySelectorAll('.line, .red-block').forEach(el => {
    el.classList.remove('lt-enter', 'lt-moving');
    el.style.transformOrigin = 'left';
    void el.offsetWidth;
    el.style.animation = 'lineClose 0.5s cubic-bezier(0.77,0,0.175,1) forwards';
  });

  whiteBlock.classList.remove('lt-enter');
  whiteBlock.style.transition = 'width 0.45s cubic-bezier(0.77,0,0.175,1), opacity 0.2s ease';
  whiteBlock.style.width = '0px';
  whiteBlock.style.opacity = '0';
  whiteBlock.style.left = '0px';

  setTimeout(() => {
    lt.style.display = 'none';
    lt.querySelectorAll('.line, .red-block').forEach(el => {
      el.style.animation = '';
      el.style.transformOrigin = '';
    });
    const l5 = lt.querySelector('.l-5');
    if (l5) l5.style.left = '0px';
    const l5a = lt.querySelector('.l-5a');
    if (l5a) l5a.style.width = '70px';
    whiteBlock.style.transition = '';
    whiteBlock.style.width = '';
    whiteBlock.style.opacity = '';
    whiteBlock.style.left = '';
    const textRoller = document.getElementById('textRoller');
    textRoller.style.transition = 'none';
    textRoller.style.transform = 'translateY(-90px)';
    setTimeout(() => { textRoller.style.transition = ''; }, 50);
    ltActive = false;
  }, 600);
}

player.addEventListener('timeupdate', () => {
  const current = player.currentTime;
  const total = player.duration;
  if (!total) return;

  if (current >= SHOW_AFTER && current < SHOW_AFTER + 1 && !ltActive) {
    triggerLowerThird();
  }
  if (total - current <= BEFORE_END && total - current > BEFORE_END - 1 && !ltActive) {
    triggerLowerThird();
  }
});

document.getElementById('splashBtn').addEventListener('click', () => {
  document.getElementById('splash').style.display = 'none';
  initPlaylist();
});

/* ── MOTEUR DE RECHERCHE ── */
(function(){
  const input = document.getElementById('searchInput');
  const results = document.getElementById('searchResults');

  function renderResults(query) {
    results.innerHTML = '';
    
    if (!query.trim()) {
      const top7 = playlist;
      const header = document.createElement('div');
      header.style.fontSize = '12px';
      header.style.color = 'rgba(255,255,255,0.4)';
      header.style.padding = '8px 14px 4px 14px';
      header.style.textTransform = 'uppercase';
      header.style.letterSpacing = '1px';
      header.textContent = 'Suggestions :';
      results.appendChild(header);

      top7.forEach(item => createResultItem(item));
      results.style.display = 'block';
      return;
    }
    
    const matched = playlistSource.filter(item => 
      item.titre.toLowerCase().includes(query.toLowerCase()) ||
      item.artiste.toLowerCase().includes(query.toLowerCase())
    );

    if (matched.length === 0) { results.style.display = 'none'; return; }

    matched.forEach(item => createResultItem(item));
    results.style.display = 'block';
  }

  function createResultItem(item) {
    const div = document.createElement('div');
    div.innerHTML = `${item.titre} <br><span>${item.artiste}</span>`;
    div.addEventListener('click', () => {
      const foundIndex = playlist.findIndex(p => p.url === item.url);
      if (foundIndex !== -1) {
        loadVideo(foundIndex);
      } else {
        playlist.splice(currentIndex + 1, 0, item);
        loadVideo(currentIndex + 1);
      }
      input.value = '';
      results.style.display = 'none';
    });
    results.appendChild(div);
  }

  input.addEventListener('input', () => renderResults(input.value));
  input.addEventListener('focus', () => { showControls(); renderResults(input.value); });
  
  document.addEventListener('click', e => {
    if (!document.getElementById('searchWrapper').contains(e.target)) {
      results.style.display = 'none';
    }
  });
})();

/* ── FULLSCREEN ── */
document.getElementById('fullscreenBtn').addEventListener('click', () => {
  if (document.fullscreenElement) document.exitFullscreen();
  else document.documentElement.requestFullscreen();
});

/* ── HORLOGE PARIS ── */
function updateParisTime() {
  const options = { timeZone: 'Europe/Paris', hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' };
  document.getElementById('parisTime').textContent = new Intl.DateTimeFormat('fr-FR', options).format(new Date());
}
setInterval(updateParisTime, 1000);
updateParisTime();

/* ── CONTRÔLES AUTO-MASQUAGE ── */
let hideControlsTimer = null;
function showControls() {
  document.body.classList.remove('controls-hidden');
  clearTimeout(hideControlsTimer);
  hideControlsTimer = setTimeout(() => document.body.classList.add('controls-hidden'), 3000);
}
document.addEventListener('mousemove', showControls);
document.addEventListener('touchstart', showControls);
</script>
</body>
</html>
